<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>GlowUp Empire Admin</title>
    <meta name="description" content="Manage GlowUp Empire dress listings.">
    <link rel="stylesheet" href="assets/css/styles.css">
    <script defer src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script defer src="assets/js/store.js"></script>
    <script defer src="assets/js/admin.js"></script>
  </head>
  <body class="admin-page">
    <header class="site-header">
      <a class="brand" href="index.html" aria-label="GlowUp Empire store">
        <span class="brand-mark">GE</span>
        <span>
          <strong>GlowUp Empire</strong>
          <small>Admin</small>
        </span>
      </a>
      <nav class="nav-links" aria-label="Primary navigation">
        <a href="index.html">Store</a>
      </nav>
    </header>

    <main class="admin-main">
      <section class="admin-dashboard" id="adminDashboard">
        <div class="admin-topbar">
          <div>
            <p class="eyebrow">Catalogue</p>
            <h1>Dress Image Slots</h1>
          </div>
          <div class="toolbar">
            <label class="secondary-button file-button">
              <i data-lucide="upload" aria-hidden="true"></i>
              Import JSON
              <input id="importJsonInput" type="file" accept="application/json,.json">
            </label>
            <button class="secondary-button" type="button" id="logoutButton">
              <i data-lucide="log-out" aria-hidden="true"></i>
              Logout
            </button>
          </div>
        </div>

        <p class="form-status" id="adminStatus" role="status"></p>

        <div class="admin-layout">
          <form class="admin-form" id="dressForm">
            <input id="editingId" type="hidden">
            <div class="form-title-row">
              <div>
                <p class="eyebrow">Text editor</p>
                <h2 id="formTitle">Select a Slot</h2>
              </div>
              <button class="icon-button" type="button" id="resetFormButton" aria-label="Reset dress form">
                <i data-lucide="rotate-ccw" aria-hidden="true"></i>
              </button>
            </div>

            <label class="field">
              <span>Name</span>
              <input id="dressName" name="name" type="text" required>
            </label>
            <label class="field">
              <span>Description</span>
              <textarea id="dressDescription" name="description" rows="5" required></textarea>
            </label>
            <div class="two-column">
              <label class="field">
                <span>Numeric sizes</span>
                <input id="dressSizes" name="sizes" type="text" inputmode="numeric" placeholder="36, 38, 40" required>
              </label>
              <label class="field">
                <span>Price (GHS)</span>
                <input id="dressPrice" name="price" type="number" min="0" step="1" required>
              </label>
            </div>

            <div class="slot-image-preview">
              <figure>
                <img id="frontImagePreview" src="assets/uploads/dress-placeholder.svg" alt="Front image preview">
                <figcaption id="frontImagePath">Front image</figcaption>
              </figure>
              <figure>
                <img id="backImagePreview" src="assets/uploads/dress-placeholder.svg" alt="Back image preview">
                <figcaption id="backImagePath">Back image</figcaption>
              </figure>
            </div>
            <label class="check-field">
              <input id="dressAvailable" name="available" type="checkbox" checked>
              <span>Available in store</span>
            </label>
            <label class="check-field">
              <input id="dressFeatured" name="featured" type="checkbox">
              <span>Feature this dress</span>
            </label>

            <div class="button-row">
              <button class="primary-button" type="submit">
                <i data-lucide="save" aria-hidden="true"></i>
                Save text edits
              </button>
              <button class="secondary-button" type="button" id="saveCatalogueButton">
                <i data-lucide="save" aria-hidden="true"></i>
                Save catalogue
              </button>
              <button class="secondary-button" type="button" id="uploadCommitButton">
                <i data-lucide="git-commit-horizontal" aria-hidden="true"></i>
                Upload & push
              </button>
              <button class="secondary-button" type="button" id="downloadCatalogueButton">
                <i data-lucide="download" aria-hidden="true"></i>
                Download JSON
              </button>
            </div>
          </form>

          <section class="listing-panel" aria-labelledby="listingTitle">
            <div class="section-heading compact">
              <div>
                <p class="eyebrow">Fixed image paths</p>
                <h2 id="listingTitle">100 Slots</h2>
              </div>
              <span class="pill" id="adminCount">0 dresses</span>
            </div>
            <div class="admin-products" id="adminProductList"></div>
          </section>
        </div>
      </section>
    </main>
  </body>
</html>
