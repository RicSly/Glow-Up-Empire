<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>GlowUp Empire Login</title>
    <meta name="description" content="Login to manage GlowUp Empire dress listings.">
    <link rel="stylesheet" href="assets/css/styles.css">
    <script defer src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script defer src="assets/js/store.js"></script>
    <script defer src="assets/js/login.js"></script>
  </head>
  <body class="admin-page">
    <header class="site-header">
      <a class="brand" href="index.html" aria-label="GlowUp Empire store">
        <span class="brand-mark">GE</span>
        <span>
          <strong>GlowUp Empire</strong>
          <small>Login</small>
        </span>
      </a>
      <nav class="nav-links" aria-label="Primary navigation">
        <a href="index.html">Store</a>
      </nav>
    </header>

    <main class="admin-main">
      <section class="login-shell" aria-labelledby="loginTitle">
        <form class="login-card" id="loginForm">
          <p class="eyebrow">Admin access</p>
          <h1 id="loginTitle">Manage Dresses</h1>
          <label class="field">
            <span>Username</span>
            <input id="adminUsername" type="text" autocomplete="username" required>
          </label>
          <label class="field">
            <span>Password</span>
            <input id="adminPassword" type="password" autocomplete="current-password" required>
          </label>
          <button class="primary-button full-width" type="submit">
            <i data-lucide="log-in" aria-hidden="true"></i>
            Login
          </button>
          <p class="form-status" id="loginStatus" role="status"></p>
        </form>
      </section>
    </main>
  </body>
</html>
